services:
  clickup-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clickup-mcp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: "${CLICKUP_MCP_PORT:-3004}"
      MCP_PATH: "${CLICKUP_MCP_PATH:-/mcp}"
    ports:
      - "${CLICKUP_MCP_HOST_PORT:-3004}:${CLICKUP_MCP_PORT:-3004}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${CLICKUP_MCP_PORT:-3004}/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 45s

networks:
  default:
    name: reverse_proxy
    external: true
